<div class="section-header text-center">
  <span class="section-tag">Hall of Fame</span>
  <h2>Friends <span class="text-gradient">Leaderboard</span></h2>
  <p>Track who rises to the top of the GameVerse. Win = 10 pts &bull; Draw = 5 pts &bull; Loss = 0 pts.</p>
</div>

<div class="leaderboard-container glass">
  <div class="leaderboard-summary">
    <!-- Top 3 dynamic cards will go here -->
    <div class="top-3-grid" id="leaderboard-podium">
      <!-- Podium elements will be rendered dynamically -->
    </div>
  </div>
  
  <div class="table-responsive">
    <table class="table leaderboard-table">
      <thead>
        <tr>
          <th class="text-center">Rank</th>
          <th>Username</th>
          <th class="text-center">Games Played</th>
          <th class="text-center">Wins</th>
          <th class="text-center">Win %</th>
          <th class="text-center">Points</th>
        </tr>
      </thead>
      <tbody id="leaderboard-rows">
        <tr>
          <td colspan="6" class="text-center text-muted">No players ranked yet. Be the first to register and play!</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
